name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    # ── .NET Setup (Api & Worker) ────────────────────────────────────────────────────────
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    - name: Restore dependencies (.NET)
      run: dotnet restore InventoryManagementSystem/InventoryManagementSystem.sln
      
    - name: Build (.NET)
      run: dotnet build InventoryManagementSystem/InventoryManagementSystem.sln --no-restore --configuration Release

    - name: Architecture Test
      run: dotnet test InventoryManagementSystem/InventoryAlert.ArchitectureTests/InventoryAlert.ArchitectureTests.csproj --no-restore --no-build --configuration Release --verbosity normal
      
    - name: Unit Test & Coverage
      run: |
        dotnet test InventoryManagementSystem/InventoryAlert.UnitTests/InventoryAlert.UnitTests.csproj \
          --no-restore --no-build --configuration Release \
          --verbosity normal \
          --collect:"XPlat Code Coverage" \
          --results-directory ./coverage
          
    - name: Generate Coverage Report
      run: |
        dotnet tool install --global dotnet-reportgenerator-globaltool
        reportgenerator \
          -reports:./coverage/**/coverage.cobertura.xml \
          -targetdir:./coverage/report \
          -reporttypes:"Html;MarkdownSummary"
        
        # Display summary in GitHub Action UI
        echo "## Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
        cat ./coverage/report/Summary.md >> $GITHUB_STEP_SUMMARY

    - name: Integration Test
      run: dotnet test InventoryManagementSystem/InventoryAlert.IntegrationTests/InventoryAlert.IntegrationTests.csproj --no-restore --no-build --configuration Release --verbosity normal

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: code-coverage-report
        path: ./coverage/report

    # ── Node.js Setup (UI) ─────────────────────────────────────────────────────────────
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: InventoryAlert.UI/package-lock.json

    - name: Install UI dependencies
      run: npm ci
      working-directory: InventoryAlert.UI

    - name: UI Lint
      run: npm run lint
      working-directory: InventoryAlert.UI

    - name: UI Test
      run: npm run test
      working-directory: InventoryAlert.UI

    # ── Docker Integration & E2E Tests ──────────────────────────────────────────────
    - name: Seed Configuration Files (CI)
      run: |
        cp InventoryAlert.Api/appsettings.Example.json InventoryAlert.Api/appsettings.json
        cp InventoryAlert.Worker/appsettings.Example.json InventoryAlert.Worker/appsettings.json
      working-directory: InventoryManagementSystem

    - name: Start Docker Stack
      id: start-docker
      run: |
        docker compose up -d --build || (echo "Docker Compose failed to start" && docker ps -a && docker compose logs api && docker compose logs db && exit 1)
      working-directory: InventoryManagementSystem

    - name: Wait for Services Health (API & Worker)
      run: |
        echo "Waiting for API & Worker to be healthy..."
        for i in {1..30}; do
          API_HEALTH=$(curl -s http://127.0.0.1:8080/health | grep -q '"status":"Healthy"' && echo "UP" || echo "DOWN")
          WORKER_HEALTH=$(curl -s http://127.0.0.1:8081/health | grep -q '"status":"Healthy"' && echo "UP" || echo "DOWN")
          
          echo "[$i/30] API: $API_HEALTH | Worker: $WORKER_HEALTH"
          
          if [ "$API_HEALTH" = "UP" ] && [ "$WORKER_HEALTH" = "UP" ]; then
            echo "All services are Healthy!"
            exit 0
          fi
          sleep 5
        done
        echo "Error: Services failed to reach healthy state within 150s"
        docker compose logs api
        docker compose logs worker
        exit 1
      shell: bash
      working-directory: InventoryManagementSystem

    - name: Run E2E Tests
      run: dotnet test InventoryAlert.E2ETests/InventoryAlert.E2ETests.csproj --no-restore --configuration Release --verbosity normal
      working-directory: InventoryManagementSystem

    - name: Docker Cleanup
      if: always()
      run: docker compose down -v --rmi local
      working-directory: InventoryManagementSystem

