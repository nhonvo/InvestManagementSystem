name: Deploy Wiki to GitHub Pages

on:
  push:
    branches: [ "main" ]
    paths:
      - 'InventoryAlert.Wiki/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'InventoryAlert.Wiki/**'
      - '.github/workflows/deploy-wiki.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: InventoryAlert.Wiki/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: InventoryAlert.Wiki

      - name: Build Docusaurus
        run: npm run build
        working-directory: InventoryAlert.Wiki

      # This prevents GitHub from running Jekyll on the 'gh-pages' branch
      - name: Create .nojekyll
        run: touch InventoryAlert.Wiki/build/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./InventoryAlert.Wiki/build
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'