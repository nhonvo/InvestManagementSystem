services:

  # ==========================================================
  # API — REST API + Event Publisher
  # ==========================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inventory_api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    depends_on:
      db:
        condition: service_healthy
      moto-init:
        condition: service_completed_successfully
    networks:
      - app-network
    restart: unless-stopped

  # ==========================================================
  # Worker — Hangfire + SQS Consumer
  # ==========================================================
  worker:
    build:
      context: .
      dockerfile: InventoryAlert.Worker/Dockerfile
    container_name: inventory_worker
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - DOTNET_ENVIRONMENT=Docker
      # AWS SDK reads these from OS env — cannot be in appsettings.json
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      # .NET config (Database, Redis, Aws endpoints) → appsettings.Docker.json
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      moto-init:
        condition: service_completed_successfully
    networks:
      - app-network
    restart: unless-stopped

  # ==========================================================
  # PostgreSQL — Primary datastore
  # ==========================================================
  db:
    image: postgres:17-alpine
    container_name: inventory_db
    environment:
      POSTGRES_DB: InventoryAlertDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"   # Expose on 5433 to avoid conflict with local postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d InventoryAlertDb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  # ==========================================================
  # Redis — Job scheduling state + message dedup cache
  # ==========================================================
  redis:
    image: redis:7.2-alpine
    container_name: inventory_cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  # ==========================================================
  # Moto — Mock AWS SNS + SQS
  # ==========================================================
  moto:
    image: motoserver/moto:5.1.22
    container_name: inventory_moto
    ports:
      - "5000:5000"
    environment:
      - MOTO_HOST=0.0.0.0
      - MOTO_PORT=5000
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    command: ["-H", "0.0.0.0", "-p", "5000"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-network
    restart: unless-stopped

  # ==========================================================
  # Moto Init — Create SNS topic + SQS queues (runs once)
  # ==========================================================
  moto-init:
    image: amazon/aws-cli:2.3.4
    container_name: inventory_moto_init
    depends_on:
      moto:
        condition: service_healthy
    volumes:
      - ./SolutionFolder/moto-init:/moto-init:ro
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ENDPOINT_URL=http://moto:5000
    entrypoint: ["/bin/bash", "-c", "/moto-init/init-all.sh"]
    networks:
      - app-network

  # ==========================================================
  # Next.js UI Frontend
  # ==========================================================
  ui:
    build:
      context: ../InventoryAlert.UI
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8080
    container_name: inventory_ui
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXTAUTH_SECRET=dev-secret
      - NEXTAUTH_URL=http://localhost:3000
    depends_on:
      - api
    networks:
      - app-network

  # ==========================================================
  # Seq — Centralized Logging
  # ==========================================================
  seq:
    image: datalust/seq:latest
    container_name: inventory_seq
    environment:
      - ACCEPT_EULA=Y
    ports:
      - "5341:80"        # UI on port 5341 (standard local Seq port)
    networks:
      - app-network
    restart: unless-stopped

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
