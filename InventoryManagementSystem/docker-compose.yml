services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inventory_api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    container_name: inventory_db
    environment:
      POSTGRES_DB: InventoryAlertDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"   # Expose on 5433 to avoid conflict with local postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d InventoryAlertDb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  moto:
    image: motoserver/moto:latest
    container_name: inventory_moto
    ports:
      - "5000:5000"
    environment:
      - MOTO_PORT=5000
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: inventory_cache
    ports:
      - "6379:6379"
    networks:
      - app-network
    restart: unless-stopped

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
