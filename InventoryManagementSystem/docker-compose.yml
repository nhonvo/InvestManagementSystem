# ==========================================================
# Inventory Management System — Production Stack
# ==========================================================
networks:
  inventory-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:

services:
  # ── API: REST + Event Publisher ────────────────────────
  api:
    build:
      context: .
      dockerfile: InventoryAlert.Api/Dockerfile
    container_name: inventory-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - Redis__ConnectionString=redis:6379
      - Seq__ServerUrl=http://seq:80
      - Api__EnableBodyLogging=true
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      # - Finnhub__ApiBaseUrl=http://wiremock:8080
      - Database__DefaultConnection=Host=db;Database=inventory_alert_db;Username=postgres;Password=postgres
    depends_on:
      db:
        condition: service_healthy
      moto-init:
        condition: service_completed_successfully

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - inventory-net
    restart: unless-stopped

  # ── Worker: Hangfire + SQS Consumer ────────────────────
  worker:
    build:
      context: .
      dockerfile: InventoryAlert.Worker/Dockerfile
    container_name: inventory-worker
    ports:
      - "8081:8080" # Hangfire Dashboard exposure
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - Redis__ConnectionString=redis:6379
      - Seq__ServerUrl=http://seq:80
      - Worker__EnablePayloadLogging=true
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_HTTP_PORTS=8080
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      # - Finnhub__ApiBaseUrl=http://wiremock:8080
      - Database__DefaultConnection=Host=db;Database=inventory_alert_db;Username=postgres;Password=postgres
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - inventory-net
    restart: unless-stopped

  # ── PostgreSQL: Domain Storage ─────────────────────────
  db:
    image: postgres:17-alpine
    container_name: inventory-db
    environment:
      - POSTGRES_DB=inventory_alert_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inventory_alert_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - inventory-net
    restart: unless-stopped

  # ── Redis: Job State + Cache ──────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: inventory-cache
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    networks:
      - inventory-net
    restart: unless-stopped

  # ── Moto: AWS Mock (S3/SQS/Dynamo) ─────────────────────
  moto:
    image: motoserver/moto:5.1.22
    container_name: inventory-moto
    ports:
      - "5000:5000"
    environment:
      - MOTO_HOST=0.0.0.0
      - MOTO_PORT=5000
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5000 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 10
    networks:
      - inventory-net
    restart: unless-stopped

  # ── Moto Init: Infra Provisioning ──────────────────────
  moto-init:
    image: amazon/aws-cli:latest
    container_name: inventory-moto-init
    depends_on:
      moto:
        condition: service_healthy
    volumes:
      - ./SolutionFolder/moto-init:/moto-init:ro
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ENDPOINT_URL=http://moto:5000
    entrypoint: ["/bin/sh", "-c", "sh /moto-init/init-all.sh"]
    networks:
      - inventory-net

  # ── UI: Next.js Frontend ──────────────────────────────
  ui:
    build:
      context: ../InventoryAlert.UI
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8080
    container_name: inventory-ui
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      api:
        condition: service_healthy
    networks:
      - inventory-net

  # ==========================================================
  # WireMock
  # ==========================================================
  wiremock:
    image: wiremock/wiremock:latest
    container_name: inventory_wiremock
    ports:
      - "9091:8080"
    volumes:
      - ./InventoryAlert.IntegrationTests/Wiremock:/home/wiremock
    command:
      - "--global-response-templating"
      - "--verbose"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/__admin"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - inventory-net
    restart: unless-stopped

  # ── Seq: Logging Dashboard ─────────────────────────────
  seq:
    image: datalust/seq:latest
    container_name: inventory-seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true
    ports:
      - "5341:80"
    networks:
      - inventory-net
    restart: unless-stopped
